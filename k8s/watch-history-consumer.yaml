apiVersion: apps/v1
kind: Deployment
metadata:
  name: watch-history-consumer
  namespace: analytics
  labels:
    app: watch-history-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watch-history-consumer
  template:
    metadata:
      labels:
        app: watch-history-consumer
    spec:
      containers:
        - name: consumer
          image: ghcr.io/rajesh-proddu/videostreamingplatform-analytics/watch-history-consumer:latest
          env:
            - name: KAFKA_BROKERS
              value: kafka.infra.svc.cluster.local:9092
            - name: KAFKA_WATCH_TOPIC
              value: watch-events
            - name: KAFKA_GROUP_ID
              value: watch-history-consumer
            - name: ICEBERG_CATALOG_NAME
              value: nessie
            - name: ICEBERG_CATALOG_TYPE
              value: rest
            - name: ICEBERG_CATALOG_URI
              value: http://nessie.iceberg.svc.cluster.local:19120/iceberg/
            - name: ICEBERG_WAREHOUSE
              value: s3://iceberg-warehouse/
            - name: S3_ENDPOINT
              value: http://minio.iceberg.svc.cluster.local:9000
            - name: ICEBERG_TABLE
              value: analytics.watch_history
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
