apiVersion: apps/v1
kind: Deployment
metadata:
  name: watch-history-consumer
  namespace: analytics
  labels:
    app: watch-history-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watch-history-consumer
  template:
    metadata:
      labels:
        app: watch-history-consumer
    spec:
      containers:
        - name: consumer
          image: ghcr.io/rajesh-proddu/videostreamingplatform-analytics/watch-history-consumer:latest
          env:
            - name: KAFKA_BROKERS
              value: kafka.infra.svc.cluster.local:9092
            - name: KAFKA_WATCH_TOPIC
              value: watch-events
            - name: KAFKA_GROUP_ID
              value: watch-history-consumer
            - name: ICEBERG_CATALOG_NAME
              value: glue
            - name: ICEBERG_WAREHOUSE
              value: s3://iceberg-warehouse/
            - name: ICEBERG_TABLE
              value: analytics.watch_history
            - name: AWS_REGION
              value: us-east-1
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
