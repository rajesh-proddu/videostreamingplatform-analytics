apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-init
  namespace: analytics
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: catalog-admin
          image: ghcr.io/rajesh-proddu/videostreamingplatform-analytics/catalog-admin:latest
          args: ["create-tables"]
          env:
            - name: ICEBERG_CATALOG_NAME
              value: glue
            - name: ICEBERG_WAREHOUSE
              value: s3://iceberg-warehouse/
            - name: AWS_REGION
              value: us-east-1
---
# Compaction CronJob — rewrites small files weekly
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iceberg-compaction
  namespace: analytics
spec:
  schedule: "0 3 * * 0"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: catalog-admin
              image: ghcr.io/rajesh-proddu/videostreamingplatform-analytics/catalog-admin:latest
              args: ["compact", "analytics.watch_history"]
              env:
                - name: ICEBERG_CATALOG_NAME
                  value: glue
                - name: ICEBERG_WAREHOUSE
                  value: s3://iceberg-warehouse/
                - name: AWS_REGION
                  value: us-east-1
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
---
# Snapshot expiry CronJob — cleans up old snapshots daily
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iceberg-expire-snapshots
  namespace: analytics
spec:
  schedule: "0 4 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: catalog-admin
              image: ghcr.io/rajesh-proddu/videostreamingplatform-analytics/catalog-admin:latest
              args: ["expire-snapshots", "analytics.watch_history"]
              env:
                - name: ICEBERG_CATALOG_NAME
                  value: glue
                - name: ICEBERG_WAREHOUSE
                  value: s3://iceberg-warehouse/
                - name: AWS_REGION
                  value: us-east-1
