apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-init
  namespace: analytics
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-nessie
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -qO- http://nessie.iceberg.svc.cluster.local:19120/api/v2/config; do sleep 2; done']
      containers:
        - name: catalog-admin
          image: ghcr.io/rajesh-proddu/videostreamingplatform-analytics/catalog-admin:latest
          args: ["create-tables"]
          env:
            - name: ICEBERG_CATALOG_NAME
              value: nessie
            - name: ICEBERG_CATALOG_TYPE
              value: rest
            - name: ICEBERG_CATALOG_URI
              value: http://nessie.iceberg.svc.cluster.local:19120/iceberg/
            - name: ICEBERG_WAREHOUSE
              value: s3://iceberg-warehouse/
            - name: S3_ENDPOINT
              value: http://minio.iceberg.svc.cluster.local:9000
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
---
# Compaction CronJob — rewrites small files weekly
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iceberg-compaction
  namespace: analytics
spec:
  schedule: "0 3 * * 0"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: catalog-admin
              image: ghcr.io/rajesh-proddu/videostreamingplatform-analytics/catalog-admin:latest
              args: ["compact", "analytics.watch_history"]
              env:
                - name: ICEBERG_CATALOG_NAME
                  value: nessie
                - name: ICEBERG_CATALOG_TYPE
                  value: rest
                - name: ICEBERG_CATALOG_URI
                  value: http://nessie.iceberg.svc.cluster.local:19120/iceberg/
                - name: ICEBERG_WAREHOUSE
                  value: s3://iceberg-warehouse/
                - name: S3_ENDPOINT
                  value: http://minio.iceberg.svc.cluster.local:9000
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: secret-key
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
---
# Snapshot expiry CronJob — cleans up old snapshots daily
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iceberg-expire-snapshots
  namespace: analytics
spec:
  schedule: "0 4 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: catalog-admin
              image: ghcr.io/rajesh-proddu/videostreamingplatform-analytics/catalog-admin:latest
              args: ["expire-snapshots", "analytics.watch_history"]
              env:
                - name: ICEBERG_CATALOG_NAME
                  value: nessie
                - name: ICEBERG_CATALOG_TYPE
                  value: rest
                - name: ICEBERG_CATALOG_URI
                  value: http://nessie.iceberg.svc.cluster.local:19120/iceberg/
                - name: ICEBERG_WAREHOUSE
                  value: s3://iceberg-warehouse/
                - name: S3_ENDPOINT
                  value: http://minio.iceberg.svc.cluster.local:9000
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: secret-key
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: analytics
type: Opaque
stringData:
  access-key: "CHANGEME"
  secret-key: "CHANGEME"
