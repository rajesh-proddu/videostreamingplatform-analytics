name: Analytics CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r kafka-es-consumer/requirements.txt
          pip install -r spark/requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Test Kafka→ES consumer
        run: pytest kafka-es-consumer/tests/ -v

      - name: Test Spark ingestion
        run: pytest spark/tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build consumer image
        run: docker build -t kafka-es-consumer:ci kafka-es-consumer/

      - name: Build Spark image
        run: docker build -t spark-ingest:ci spark/
