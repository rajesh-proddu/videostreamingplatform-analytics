name: Analytics CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: analytics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r kafka-es-consumer/requirements.txt
          pip install -r watch-history-consumer/requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Test Kafka→ES consumer
        run: pytest kafka-es-consumer/tests/ -v

      - name: Test Watch History consumer
        run: pytest watch-history-consumer/tests/ -v

  build-and-push:
    if: github.event_name == 'push'
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: kafka-es-consumer
            context: kafka-es-consumer
          - name: watch-history-consumer
            context: watch-history-consumer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.service.name }}"
          TAGS="${IMAGE}:${{ github.sha }},${IMAGE}:latest"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Image digest
        run: echo "${{ matrix.service.name }} pushed with tags ${{ steps.tags.outputs.tags }}"
